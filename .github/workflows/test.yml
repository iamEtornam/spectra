name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      
      - name: Install dependencies
        run: dart pub get
      
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      
      - name: Analyze project
        run: dart analyze --fatal-infos
      
      - name: Run model tests
        run: dart test test/models/
      
      - name: Run service tests
        run: dart test test/services/secure_storage_service_test.dart
      
      - name: Run agent tests
        run: dart test test/agents/
      
      - name: Run utility tests
        run: dart test test/utils/
      
      - name: Run command tests
        run: dart test test/commands/
      
      - name: Run e2e tests
        run: dart test test/e2e/

      - name: Run feature tests
        run: dart test test/features/

      - name: Generate coverage
        # Coverage is generated per-suite (mirroring the discrete test steps
        # above) instead of with a single `dart test --coverage=coverage`
        # invocation. Multiple unrelated suites share `ConfigService` and
        # `SecureStorageService` singletons, and lumping them into one Dart
        # VM triggers state-bleed races that do not happen in production. The
        # per-suite invocation gives accurate coverage without that artifact.
        run: |
          mkdir -p coverage
          for suite in \
            test/models/ \
            test/services/secure_storage_service_test.dart \
            test/agents/ \
            test/utils/ \
            test/commands/ \
            test/e2e/ \
            test/features/; do
            dart test --coverage=coverage "$suite"
          done
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      
      - name: Check for security issues
        run: |
          dart pub get
          # `--mode=null-safety` was removed once null safety became
          # mandatory. A plain outdated check still surfaces stale
          # dependencies without failing CI on transitive ones.
          dart pub outdated || true
      
      - name: Verify no secrets in code
        run: |
          # Match real-looking key shapes only; the previous `grep "sk-"`
          # was firing on docstring placeholders like `'sk-...'`.
          # OpenAI: `sk-` followed by 20+ alphanumerics (no dots).
          # Google: `AIza` followed by 35+ alphanumerics, dashes, underscores.
          if grep -REn 'sk-[A-Za-z0-9]{20,}' lib/; then
            echo "Potential OpenAI API key found in code!"
            exit 1
          fi
          if grep -REn 'AIza[A-Za-z0-9_-]{35,}' lib/; then
            echo "Potential Google API key found in code!"
            exit 1
          fi
